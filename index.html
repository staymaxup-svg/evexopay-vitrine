<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EvexoPay</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #0b0f17; color: #fff; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 56px 20px; }
    .card { background: #121a2a; border: 1px solid #22304d; border-radius: 16px; padding: 28px; }
    h1 { margin: 0 0 10px; font-size: 34px; }
    p { margin: 0 0 20px; color: #cbd5e1; line-height: 1.5; }
    .btns { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 18px; }
    a.btn { display: inline-block; padding: 12px 16px; border-radius: 12px; text-decoration: none; font-weight: 700; }
    .primary { background: #3b82f6; color: #fff; }
    .ghost { background: transparent; border: 1px solid #334155; color: #fff; }
    .note { margin-top: 18px; font-size: 13px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>EvexoPay</h1>
      <p>Checkout e painel de gestão para vender com mais controle, tracking e performance.</p>

      <div class="btns">
        <a class="btn primary" href="https://admin.evexopay.com" target="_blank" rel="noreferrer">Entrar no Painel</a>
        <a class="btn ghost" href="https://checkout.evexopay.com" target="_blank" rel="noreferrer">Acessar Checkout</a>
        <a class="btn ghost" href="https://go.evexopay.com" target="_blank" rel="noreferrer">Páginas (Go)</a>
      </div>

      <div class="note">
        Em breve: cadastro de usuários em app.evexopay.com, modelos de checkout e copys configuráveis.
      </div>
    </div>
  </div>
</body>
</html>
